<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=480">
    <base href="/demo/citrusmall/">
    <title>Спасибо — пример лендинга</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            background: #f4f4f4;
        }

        .thankyou-wrap {
            max-width: 480px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
        }

        .thankyou-title {
            font-size: 32px;
            background: #20d500;
            color: white;
            line-height: 36px;
            padding: 15px;
            margin-bottom: 30px;
        }

        .thankyou-text {
            font-size: 16px;
            line-height: 1.6;
            color: #333;
            margin-bottom: 30px;
        }

        .thankyou-note {
            font-size: 14px;
            color: #666;
            margin-bottom: 30px;
        }

        .thankyou-btn {
            display: inline-block;
            background: #20d500;
            color: white;
            padding: 14px 28px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 16px;
        }

        .thankyou-btn:hover {
            color: white;
            opacity: 0.9;
        }

        .thankyou-btn-secondary {
            display: inline-block;
            margin-top: 16px;
            background: transparent;
            color: #20d500;
            border: 2px solid #20d500;
            padding: 12px 26px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 16px;
        }

        .thankyou-btn-secondary:hover {
            color: #1ab800;
            border-color: #1ab800;
        }

        .thankyou-footer {
            margin-top: 40px;
            font-size: 14px;
            color: #888;
        }

        .thankyou-footer a {
            color: #20d500;
        }
    </style>
</head>

<body>
    <div class="thankyou-wrap">
        <h1 class="thankyou-title">Спасибо!</h1>
        <p class="thankyou-text">
            Это демонстрационная версия лендинга для портфолио.
        </p>
        <p class="thankyou-note">
            Заявка никуда не отправлялась и не сохранялась.<br>
            Реальные данные и интеграции отключены — это просто пример.
        </p>
        <a href="index.html" class="thankyou-btn">Вернуться на лендинг</a>
        <a href="/" class="thankyou-btn-secondary">Вернуться на основной сайт</a>
        <p class="thankyou-footer">
            <a href="disclaimer.html">Информация о демо-версии</a>
        </p>
    </div>
</body>

</html>
