<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="/demo/nsv/">
    <title>Спасибо — демо-лендинг</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            background: #f5f5f5;
            color: #333;
        }
        .wrap {
            max-width: 520px;
            margin: 0 auto;
            padding: 48px 20px;
            text-align: center;
        }
        h1 {
            font-size: 28px;
            color: #FF6B35;
            margin-bottom: 20px;
        }
        p { line-height: 1.6; margin-bottom: 16px; }
        .note { color: #666; font-size: 15px; }
        a.btn {
            display: inline-block;
            margin-top: 24px;
            padding: 14px 28px;
            background: #FF6B35;
            color: white;
            text-decoration: none;
            border-radius: 250px;
            font-weight: 500;
        }
        a.btn-outline {
            display: inline-block;
            margin-top: 16px;
            padding: 12px 26px;
            background: transparent;
            color: #FF6B35;
            border: 2px solid #FF6B35;
            text-decoration: none;
            border-radius: 250px;
            font-weight: 500;
        }
        a.link { color: #FF6B35; }
    </style>
</head>
<body>
    <div class="wrap">
        <h1>Спасибо!</h1>

        <a class="btn" href="product/laptops">Вернуться на лендинг</a>

    </div>

</html>
